<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Habit Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f8f4ee, #eef5ef);
      color: #1f2933;
      padding: 14px;
    }

    .app {
      max-width: 520px;
      margin: auto;
      padding-bottom: 30px;
    }

    .header {
      background: #2f6f46;
      color: white;
      padding: 24px 18px;
      border-radius: 24px;
      margin-bottom: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 8px 0 0;
      opacity: 0.9;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.07);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      text-align: center;
    }

    .stat {
      background: #f6f7f4;
      border-radius: 16px;
      padding: 12px 8px;
    }

    .stat strong {
      display: block;
      font-size: 22px;
      color: #2f6f46;
    }

    .stat span {
      font-size: 12px;
      color: #667085;
    }

    .add-box {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #d0d5dd;
      border-radius: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .add-btn, .done-btn {
      background: #2f6f46;
      color: white;
    }

    .edit-btn {
      background: #f0d98c;
      color: #333;
    }

    .delete-btn {
      background: #d94f4f;
      color: white;
    }

    .habit {
      border: 1px solid #edf0f2;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fcfcfc;
    }

    .habit.done {
      background: #eef8f0;
      opacity: 0.85;
    }

    .habit-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .habit.done .habit-name {
      text-decoration: line-through;
    }

    .habit-info {
      color: #667085;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    canvas {
      max-height: 240px;
    }

    .small-title {
      font-weight: 700;
      margin-bottom: 12px;
      color: #344054;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Daily Habit Tracker</h1>
      <p id="todayDate"></p>
    </div>

    <div class="card summary">
      <div class="stat">
        <strong id="completedCount">0</strong>
        <span>Done Today</span>
      </div>
      <div class="stat">
        <strong id="totalCount">0</strong>
        <span>Total Habits</span>
      </div>
      <div class="stat">
        <strong id="percentCount">0%</strong>
        <span>Progress</span>
      </div>
    </div>

    <div class="card">
      <div class="add-box">
        <input id="habitInput" placeholder="Add a daily habit..." />
        <button class="add-btn" onclick="addHabit()">Add</button>
      </div>
    </div>

    <div class="card">
      <div class="small-title">Today's Habits</div>
      <div id="habitList"></div>
    </div>

    <div class="card">
      <div class="small-title">Weekly Progress</div>
      <canvas id="weeklyChart"></canvas>
    </div>

    <div class="card">
      <div class="small-title">Habit Performance</div>
      <canvas id="habitChart"></canvas>
    </div>
  </div>

  <script>
    const today = new Date().toDateString();
    document.getElementById("todayDate").innerText = today;

    let habits = JSON.parse(localStorage.getItem("habits")) || [];
    let history = JSON.parse(localStorage.getItem("habitHistory")) || {};

    let weeklyChart;
    let habitChart;

    function saveData() {
      localStorage.setItem("habits", JSON.stringify(habits));
      localStorage.setItem("habitHistory", JSON.stringify(history));
    }

    function resetDailyStatus() {
      habits.forEach(habit => {
        if (habit.lastDate !== today) {
          habit.completed = false;
          habit.lastDate = today;
        }
      });
      saveData();
    }

    function addHabit() {
      const input = document.getElementById("habitInput");
      const name = input.value.trim();

      if (!name) return;

      habits.push({
        name,
        completed: false,
        streak: 0,
        totalCompleted: 0,
        lastDate: today
      });

      input.value = "";
      saveData();
      render();
    }

    function toggleHabit(index) {
      const habit = habits[index];
      habit.completed = !habit.completed;

      if (habit.completed) {
        habit.streak++;
        habit.totalCompleted++;
      } else {
        habit.streak = Math.max(0, habit.streak - 1);
        habit.totalCompleted = Math.max(0, habit.totalCompleted - 1);
      }

      updateTodayHistory();
      saveData();
      render();
    }

    function editHabit(index) {
      const updated = prompt("Edit habit:", habits[index].name);
      if (updated && updated.trim()) {
        habits[index].name = updated.trim();
        saveData();
        render();
      }
    }

    function deleteHabit(index) {
      if (confirm("Delete this habit?")) {
        habits.splice(index, 1);
        updateTodayHistory();
        saveData();
        render();
      }
    }

    function updateTodayHistory() {
      const completed = habits.filter(h => h.completed).length;
      const total = habits.length;
      history[today] = {
        completed,
        total,
        percent: total ? Math.round((completed / total) * 100) : 0
      };
    }

    function renderHabits() {
      const list = document.getElementById("habitList");
      list.innerHTML = "";

      if (habits.length === 0) {
        list.innerHTML = "<p style='color:#667085;'>No habits yet. Add your first one above.</p>";
        return;
      }

      habits.forEach((habit, index) => {
        const div = document.createElement("div");
        div.className = "habit " + (habit.completed ? "done" : "");

        div.innerHTML = `
          <div class="habit-name">${habit.name}</div>
          <div class="habit-info">🔥 Streak: ${habit.streak} days · ✅ Total completed: ${habit.totalCompleted}</div>
          <div class="actions">
            <button class="done-btn" onclick="toggleHabit(${index})">${habit.completed ? "Undo" : "Done"}</button>
            <button class="edit-btn" onclick="editHabit(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteHabit(${index})">Delete</button>
          </div>
        `;

        list.appendChild(div);
      });
    }

    function updateSummary() {
      const completed = habits.filter(h => h.completed).length;
      const total = habits.length;
      const percent = total ? Math.round((completed / total) * 100) : 0;

      document.getElementById("completedCount").innerText = completed;
      document.getElementById("totalCount").innerText = total;
      document.getElementById("percentCount").innerText = percent + "%";
    }

    function getLast7Days() {
      const days = [];

      for (let i = 6; i >= 0; i--) {
        const date = new Date();
        date.setDate(date.getDate() - i);
        days.push(date.toDateString());
      }

      return days;
    }

    function renderCharts() {
      const last7 = getLast7Days();

      const weeklyLabels = last7.map(day =>
        new Date(day).toLocaleDateString("en-US", { weekday: "short" })
      );

      const weeklyData = last7.map(day => history[day]?.percent || 0);

      if (weeklyChart) weeklyChart.destroy();
      weeklyChart = new Chart(document.getElementById("weeklyChart"), {
        type: "line",
        data: {
          labels: weeklyLabels,
          datasets: [{
            label: "Completion %",
            data: weeklyData,
            borderWidth: 3,
            tension: 0.35,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, max: 100 }
          }
        }
      });

      if (habitChart) habitChart.destroy();
      habitChart = new Chart(document.getElementById("habitChart"), {
        type: "bar",
        data: {
          labels: habits.map(h => h.name),
          datasets: [{
            label: "Total Completed",
            data: habits.map(h => h.totalCompleted),
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    }

    function render() {
      resetDailyStatus();
      updateTodayHistory();
      renderHabits();
      updateSummary();
      renderCharts();
      saveData();
    }

    render();
  </script>
</body>
</html>
