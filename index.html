<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Habit Tracker</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ef;
      color: #222;
      padding: 16px;
    }

    .app {
      max-width: 480px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #3f7d4c;
      margin-bottom: 5px;
    }

    .date {
      text-align: center;
      color: #777;
      margin-bottom: 20px;
    }

    .progress-box {
      margin-bottom: 20px;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e6e6e6;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #3f7d4c;
      transition: 0.3s;
    }

    .add-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      cursor: pointer;
    }

    .add-btn {
      background: #3f7d4c;
      color: white;
    }

    .habit {
      background: #fafafa;
      border: 1px solid #eee;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .habit-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .habit-name {
      font-weight: bold;
      font-size: 17px;
      word-break: break-word;
    }

    .habit-info {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }

    .complete-btn {
      flex: 1;
      background: #3f7d4c;
      color: white;
    }

    .edit-btn {
      background: #e9d8a6;
      color: #333;
    }

    .delete-btn {
      background: #d9534f;
      color: white;
    }

    .done {
      opacity: 0.65;
    }

    .done .habit-name {
      text-decoration: line-through;
    }

    .history {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
      background: #f7f4ef;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Daily Habit Tracker</h1>
    <div class="date" id="todayDate"></div>

    <div class="progress-box">
      <div class="progress-text">
        <span>Today's Progress</span>
        <span id="progressText">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="add-box">
      <input id="habitInput" placeholder="Add daily habit..." />
      <button class="add-btn" onclick="addHabit()">Add</button>
    </div>

    <div id="habitList"></div>

    <div class="history">
      <strong>Daily Tracking:</strong>
      <div id="dailyStats"></div>
    </div>
  </div>

  <script>
    const today = new Date().toDateString();
    document.getElementById("todayDate").innerText = today;

    let habits = JSON.parse(localStorage.getItem("habits")) || [];
    let history = JSON.parse(localStorage.getItem("habitHistory")) || {};

    function saveData() {
      localStorage.setItem("habits", JSON.stringify(habits));
      localStorage.setItem("habitHistory", JSON.stringify(history));
    }

    function resetDailyStatus() {
      habits.forEach(habit => {
        if (habit.lastDate !== today) {
          habit.completed = false;
          habit.lastDate = today;
        }
      });
      saveData();
    }

    function addHabit() {
      const input = document.getElementById("habitInput");
      const name = input.value.trim();

      if (!name) return;

      habits.push({
        name,
        completed: false,
        streak: 0,
        totalCompleted: 0,
        lastDate: today
      });

      input.value = "";
      saveData();
      render();
    }

    function completeHabit(index) {
      const habit = habits[index];

      habit.completed = !habit.completed;

      if (habit.completed) {
        habit.streak++;
        habit.totalCompleted++;
      } else {
        habit.streak = Math.max(0, habit.streak - 1);
        habit.totalCompleted = Math.max(0, habit.totalCompleted - 1);
      }

      updateTodayHistory();
      saveData();
      render();
    }

    function editHabit(index) {
      const newName = prompt("Edit habit:", habits[index].name);
      if (newName && newName.trim()) {
        habits[index].name = newName.trim();
        saveData();
        render();
      }
    }

    function deleteHabit(index) {
      if (confirm("Delete this habit?")) {
        habits.splice(index, 1);
        updateTodayHistory();
        saveData();
        render();
      }
    }

    function updateTodayHistory() {
      const completed = habits.filter(h => h.completed).length;
      history[today] = {
        completed,
        total: habits.length,
        percent: habits.length ? Math.round((completed / habits.length) * 100) : 0
      };
    }

    function render() {
      resetDailyStatus();

      const list = document.getElementById("habitList");
      list.innerHTML = "";

      habits.forEach((habit, index) => {
        const div = document.createElement("div");
        div.className = "habit " + (habit.completed ? "done" : "");

        div.innerHTML = `
          <div class="habit-top">
            <div>
              <div class="habit-name">${habit.name}</div>
              <div class="habit-info">
                🔥 Streak: ${habit.streak} day(s) · ✅ Total: ${habit.totalCompleted}
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="complete-btn" onclick="completeHabit(${index})">
              ${habit.completed ? "Undo" : "Done"}
            </button>
            <button class="edit-btn" onclick="editHabit(${index})">Edit</button>
            <button class="delete-btn" onclick="deleteHabit(${index})">Delete</button>
          </div>
        `;

        list.appendChild(div);
      });

      updateTodayHistory();
      updateProgress();
      showStats();
    }

    function updateProgress() {
      const completed = habits.filter(h => h.completed).length;
      const total = habits.length;
      const percent = total ? Math.round((completed / total) * 100) : 0;

      document.getElementById("progressText").innerText = percent + "%";
      document.getElementById("progressFill").style.width = percent + "%";
    }

    function showStats() {
      const stats = document.getElementById("dailyStats");
      const recentDays = Object.keys(history).slice(-7).reverse();

      if (recentDays.length === 0) {
        stats.innerHTML = "No data yet.";
        return;
      }

      stats.innerHTML = recentDays.map(day => {
        const data = history[day];
        return `${day}: ${data.completed}/${data.total} completed (${data.percent}%)`;
      }).join("<br>");
    }

    render();
  </script>
</body>
</html>
